<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TransitOps Settings — Configure depot details and view the Role-Based Access Control (RBAC) permission matrix.">
    <title>TransitOps — Settings</title>

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/settings.css">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚍</text></svg>">
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-layout">

        <!-- ==================== SIDEBAR ==================== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <h1>TransitOps</h1>
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <a href="/dashboard"     class="nav-link" data-module="dashboard">     <span class="nav-icon">📊</span> Dashboard</a>
                <a href="/fleet"         class="nav-link" data-module="vehicles">      <span class="nav-icon">🚍</span> Fleet</a>
                <a href="/drivers"       class="nav-link" data-module="drivers">       <span class="nav-icon">👤</span> Drivers</a>
                <a href="/trips"         class="nav-link" data-module="trips">         <span class="nav-icon">🗺️</span> Trips</a>
                <a href="/maintenance"   class="nav-link" data-module="maintenance">   <span class="nav-icon">🔧</span> Maintenance</a>
                <a href="/fuel-expenses" class="nav-link" data-module="fuel_expenses"> <span class="nav-icon">⛽</span> Fuel & Expenses</a>
                <a href="/analytics"     class="nav-link" data-module="reports">       <span class="nav-icon">📈</span> Analytics</a>
                <a href="/settings"      class="nav-link active" data-module="settings"><span class="nav-icon">⚙️</span> Settings</a>
            </nav>

            <div class="sidebar-footer">
                <button class="btn-sidebar-logout" id="logoutBtn">🚪 Logout</button>
            </div>
        </aside>
        <!-- ================ END SIDEBAR ================ -->


        <!-- ==================== MAIN CONTENT ==================== -->
        <div class="main-content">

            <header class="topbar">
                <button class="menu-toggle" id="menuToggleBtn" aria-label="Toggle Menu">☰</button>
                <div class="topbar-search">
                    <input
                        type="text"
                        class="search-input"
                        id="globalSearch"
                        placeholder="Search..."
                        aria-label="Search"
                    >
                </div>
                <div class="topbar-actions">
                    <span class="user-name" id="userName">User</span>
                    <div class="role-badge" id="roleBadge">—</div>
                </div>
            </header>

            <div class="page-content">

                <!-- inline feedback banner (success / error) -->
                <div id="pageBanner" class="settings-banner" role="alert" aria-live="polite"></div>

                <!-- two-column layout matching the wireframe -->
                <div class="settings-layout">

                    <!-- ---- LEFT: General depot settings form ---- -->
                    <div class="panel settings-general-panel">
                        <h3 class="panel-title">GENERAL</h3>

                        <form id="settingsForm" novalidate>

                            <div class="form-group">
                                <label for="depotName">DEPOT NAME</label>
                                <input
                                    type="text"
                                    id="depotName"
                                    class="settings-input"
                                    placeholder="e.g. Gandhinagar Depot GT+"
                                    maxlength="100"
                                    required
                                >
                                <span class="field-error" id="errDepotName"></span>
                            </div>

                            <div class="form-group">
                                <label for="currency">CURRENCY</label>
                                <input
                                    type="text"
                                    id="currency"
                                    class="settings-input"
                                    placeholder="e.g. INR (₹)"
                                    maxlength="20"
                                    required
                                >
                                <span class="field-error" id="errCurrency"></span>
                            </div>

                            <div class="form-group">
                                <label for="distanceUnit">DISTANCE UNIT</label>
                                <input
                                    type="text"
                                    id="distanceUnit"
                                    class="settings-input"
                                    placeholder="e.g. Kilometers"
                                    maxlength="30"
                                    required
                                >
                                <span class="field-error" id="errDistanceUnit"></span>
                            </div>

                            <button type="submit" class="btn-save-settings" id="btnSaveSettings">
                                Save Changes
                            </button>

                        </form>
                    </div>
                    <!-- ---- END LEFT PANEL ---- -->


                    <!-- ---- RIGHT: RBAC permission matrix ---- -->
                    <div class="panel settings-rbac-panel">
                        <h3 class="panel-title">ROLE-BASED ACCESS (RBAC)</h3>

                        <!--
                            The table is built dynamically by settings.js once
                            the role data arrives from the API.
                        -->
                        <div class="rbac-table-wrap" id="rbacTableWrap">
                            <div class="loading-text">Loading permissions...</div>
                        </div>
                    </div>
                    <!-- ---- END RIGHT PANEL ---- -->

                </div>
                <!-- end settings-layout -->

            </div>
            <!-- end page-content -->

        </div>
        <!-- end main-content -->

    </div>
    <!-- end app-layout -->

    <script src="/js/settings.js"></script>
</body>
</html>
